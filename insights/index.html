<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0e1118">
<meta name="color-scheme" content="dark light">
<title>모든 민족과 방언에게 · To Every Tribe and Tongue</title>
<meta name="robots" content="noindex">
<meta name="description" content="한눈에 보는 성경 이야기를 여러 언어로 옮기며 마주한 진귀한 사실들 — 복음이 모든 방언에 닿는 길. / Rare facts gathered while carrying one gospel story into many tongues.">
<style>
  :root{
    --bg:#0e1118; --bg2:#141925; --ink:#f4efe6; --muted:#9aa3b2;
    --line:rgba(255,255,255,.12); --card:rgba(255,255,255,.045);
    --accent:#e9b949; --maxw:980px; color-scheme:dark;
    --full:#46a77a; --partial:#e9b949; --bridge:#cf8350; --obs:#9b7ad6; --warn:#e0795f;
    --serif:"Nanum Myeongjo",Georgia,"Times New Roman",serif;
    --sans:-apple-system,BlinkMacSystemFont,"Segoe UI","Apple SD Gothic Neo","Noto Sans KR",Roboto,sans-serif;
  }
  :root.sepia{
    --bg:#efe6d3; --bg2:#e7dcc4; --ink:#2b2519; --muted:#7a6f5a;
    --line:rgba(0,0,0,.14); --card:rgba(0,0,0,.035); --accent:#b07d23; color-scheme:light;
    --full:#3f7d5c; --partial:#b07d23; --bridge:#a8643a; --obs:#7a5db0; --warn:#b65b4a;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html{scroll-behavior:smooth;background:var(--bg)}
  body{margin:0;background:var(--bg);color:var(--ink);font-family:var(--sans);
    line-height:1.75;-webkit-font-smoothing:antialiased;overflow-x:hidden;transition:background .4s,color .4s}
  a{color:var(--accent)}
  .wrap{max-width:var(--maxw);margin:0 auto;padding:0 20px}
  h1,h2,h3{font-family:var(--serif);font-weight:700;letter-spacing:-.01em;line-height:1.25;margin:0}
  h2{font-size:clamp(1.45rem,3.8vw,2.1rem);margin:0 0 .2em}
  .kicker{font-size:.74rem;letter-spacing:.18em;text-transform:uppercase;color:var(--accent);font-weight:700;margin-bottom:.6em}
  .sub{color:var(--muted)}
  .lead{max-width:700px;color:var(--muted);margin:.2em 0 1.6em}
  /* topbar — mirrors the main site */
  #topbar{position:sticky;top:0;z-index:110;display:flex;align-items:center;gap:8px;
    padding:11px 16px;font-size:.8125rem;color:var(--muted);
    background:linear-gradient(180deg,var(--bg) 70%,transparent);backdrop-filter:blur(6px)}
  #topbar .dot{width:8px;height:8px;border-radius:50%;background:var(--accent);box-shadow:0 0 12px var(--accent)}
  #topbar a.brand{color:var(--ink);text-decoration:none;font-weight:700}
  #topbar .spacer{flex:1}
  .iconbtn{pointer-events:auto;cursor:pointer;border:1px solid var(--line);background:var(--card);
    color:var(--ink);border-radius:9px;padding:5px 9px;font-size:.8125rem;line-height:1;font-family:var(--sans)}
  #langBtn{display:inline-flex;align-items:center;gap:5px}
  #langPanel{position:fixed;top:50px;right:10px;z-index:200;width:180px;max-width:calc(100vw - 20px);
    background:var(--bg2);border:1px solid var(--line);border-radius:12px;padding:8px;
    box-shadow:0 16px 40px -12px rgba(0,0,0,.6)}
  #langPanel[hidden]{display:none}
  #langPanel button{display:block;width:100%;text-align:left;border:0;background:transparent;color:var(--ink);
    padding:9px 11px;border-radius:8px;cursor:pointer;font:inherit;font-size:.9rem}
  #langPanel button:hover,#langPanel button.on{background:var(--card)}
  /* hero */
  .hero{padding:62px 0 40px;text-align:center}
  .hero h1{font-size:clamp(2rem,6.4vw,3.3rem);margin:.1em 0 .35em}
  .hero .verse{max-width:660px;margin:18px auto 0;font-style:italic;color:var(--accent)}
  .hero .purpose{max-width:700px;margin:22px auto 0;color:var(--muted);font-size:.99rem}
  section{padding:58px 0;border-top:1px solid var(--line)}
  section.alt{background:var(--bg2)}
  .big{font-family:var(--serif);font-size:clamp(2.4rem,9vw,4.2rem);font-weight:700;color:var(--accent);line-height:1}
  .stat-row{display:flex;flex-wrap:wrap;gap:30px;margin:8px 0 0}
  .stat .n{font-family:var(--serif);font-size:clamp(1.7rem,5vw,2.5rem);font-weight:700;color:var(--full);line-height:1}
  .stat .l{font-size:.85rem;color:var(--muted)}
  /* carousel */
  .caro{position:relative;max-width:760px;margin:0 auto}
  .stage{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:30px 30px 26px;min-height:230px;
    display:flex;flex-direction:column;gap:.7em;position:relative;overflow:hidden}
  .stage .tag{font-size:.72rem;letter-spacing:.14em;text-transform:uppercase;color:var(--accent);font-weight:700}
  .stage h3{font-size:clamp(1.2rem,3.4vw,1.55rem)}
  .stage p{margin:0;font-size:1.02rem;color:var(--ink);opacity:.92}
  .stage .multi{font-size:1.15rem;letter-spacing:.02em;line-height:2}
  .caro .nav{display:flex;align-items:center;justify-content:center;gap:14px;margin-top:16px}
  .caro .arrow{border:1px solid var(--line);background:var(--card);color:var(--ink);width:38px;height:38px;
    border-radius:50%;cursor:pointer;font-size:1.1rem;line-height:1}
  .dotsnav{display:flex;gap:7px}
  .dotsnav i{width:8px;height:8px;border-radius:50%;background:var(--line);cursor:pointer;transition:.2s}
  .dotsnav i.on{background:var(--accent);transform:scale(1.3)}
  .countpos{font-size:.8rem;color:var(--muted);min-width:46px;text-align:center}
  /* dot grid */
  .dots{display:grid;grid-template-columns:repeat(20,1fr);gap:6px;max-width:520px;margin:6px 0 18px}
  .dots i{aspect-ratio:1;border-radius:50%;background:var(--line)}
  .dots i.f{background:var(--full)}
  .legend{display:flex;gap:18px;flex-wrap:wrap;font-size:.84rem;color:var(--muted)}
  .legend span{display:inline-flex;align-items:center;gap:.4em}
  .sw{width:12px;height:12px;border-radius:3px;display:inline-block}
  /* bars */
  .bars{display:flex;flex-direction:column;gap:12px;max-width:700px}
  .bar .t{display:flex;justify-content:space-between;font-size:.9rem;margin-bottom:4px}
  .bar .track{height:14px;background:var(--card);border:1px solid var(--line);border-radius:8px;overflow:hidden}
  .bar .fill{height:100%;border-radius:8px}
  /* region map */
  .regions{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:14px;margin-top:6px}
  .rg{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:16px 18px}
  .rg .top{display:flex;align-items:center;gap:.5em;font-weight:700;font-family:var(--serif);font-size:1.08rem}
  .rg .em{font-size:1.3rem}
  .rg .m{font-size:.85rem;color:var(--muted);margin:.3em 0 .6em}
  .rg .track{height:8px;background:var(--bg);border-radius:6px;overflow:hidden}
  .rg .fill{height:100%;background:var(--full);border-radius:6px}
  /* prayer list */
  .pray{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:12px;margin-top:18px}
  .pray .it{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:13px 15px}
  .pray .it b{font-size:.97rem}
  .pray .it .why{font-size:.82rem;color:var(--muted);margin-top:.25em;display:block}
  .pill{font-size:.66rem;letter-spacing:.08em;text-transform:uppercase;font-weight:700;border-radius:999px;padding:.15em .6em;vertical-align:middle;margin-left:.3em}
  .pill.DEFERRED{background:rgba(233,185,73,.18);color:var(--partial)}
  .pill.HELD{background:rgba(70,167,122,.16);color:var(--full)}
  /* verse showcase */
  .verses{columns:2;column-gap:18px}
  @media(max-width:640px){.verses{columns:1}}
  .vse{break-inside:avoid;background:var(--card);border:1px solid var(--line);border-radius:12px;padding:15px 17px;margin:0 0 16px}
  .vse .lab{font-size:.74rem;letter-spacing:.05em;color:var(--accent);font-weight:700;margin-bottom:.45em}
  .vse .tx{font-size:1.05rem;line-height:1.7;font-family:var(--serif)}
  /* treemap */
  #treemap{position:relative;width:100%;height:460px;border:1px solid var(--line);border-radius:14px;background:var(--card);overflow:hidden}
  #treemap .cell{position:absolute;overflow:hidden;border:1px solid rgba(0,0,0,.25);color:#fff;
    font-size:.72rem;padding:3px 5px;line-height:1.15;text-shadow:0 1px 2px rgba(0,0,0,.35)}
  #treemap .cell small{opacity:.9;font-size:.66rem}
  /* globe */
  .globe-wrap{display:flex;justify-content:center;margin:4px 0 6px}
  #globe{width:100%;max-width:520px;height:auto;display:block;touch-action:none;cursor:grab}
  #globe:active{cursor:grabbing}
  #globe .pt{transition:none}
  .globe-hint{text-align:center;font-size:.78rem;color:var(--muted);margin-top:2px}
  /* invitation */
  .invite{display:grid;grid-template-columns:repeat(auto-fit,minmax(210px,1fr));gap:14px;margin-top:18px}
  .invite .c{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:18px}
  .invite .c h3{margin:.1em 0 .35em;font-size:1.08rem}
  .invite .c p{margin:0;font-size:.9rem;color:var(--muted)}
  .cta{display:inline-block;margin-top:8px;background:var(--accent);color:#1a1206;text-decoration:none;
    padding:.7em 1.4em;border-radius:999px;font-weight:700}
  footer{padding:42px 0 72px;color:var(--muted);font-size:.82rem;border-top:1px solid var(--line)}
  .src{margin-top:10px;line-height:1.9}
  .en .ko-only{display:none}.ko .en-only{display:none}
</style>
</head>
<body class="ko">
<div id="topbar">
  <span class="dot"></span><a class="brand" href="/">한눈에 보는 성경 이야기</a>
  <span class="spacer"></span>
  <button class="iconbtn" id="langBtn" title="Language / 언어">🌐 <span id="langCur">한국어</span></button>
  <button class="iconbtn" id="themeBtn" title="테마 전환 / Theme">🌗</button>
</div>
<div id="langPanel" hidden>
  <button data-l="ko">한국어</button>
  <button data-l="en">English</button>
</div>

<header class="hero"><div class="wrap">
  <div class="kicker" data-t="kicker"></div>
  <h1 data-t="title"></h1>
  <p class="verse" data-t="verse"></p>
  <p class="purpose" data-t="purpose"></p>
</div></header>

<!-- RARE FACTS — the hook (auto-rotating) -->
<section id="facts" class="alt"><div class="wrap">
  <div class="kicker" data-t="f_kick"></div>
  <h2 data-t="f_h"></h2>
  <p class="lead" data-t="f_lead"></p>
  <div class="caro">
    <div class="stage" id="factStage"></div>
    <div class="nav">
      <button class="arrow" id="fPrev" aria-label="prev">‹</button>
      <span class="countpos" id="fCount"></span>
      <button class="arrow" id="fNext" aria-label="next">›</button>
    </div>
    <div class="dotsnav" id="fDots" style="justify-content:center;margin-top:12px"></div>
  </div>
</div></section>

<!-- REACH -->
<section id="reach"><div class="wrap">
  <div class="kicker" data-t="r_kick"></div>
  <h2 data-t="r_h"></h2>
  <p class="lead" data-t="r_lead"></p>
  <div class="dots" id="dots"></div>
  <div class="legend">
    <span><i class="sw" style="background:var(--full)"></i><span data-t="r_lg1"></span></span>
    <span><i class="sw" style="background:var(--line)"></i><span data-t="r_lg2"></span></span>
  </div>
  <div class="stat-row" style="margin-top:24px">
    <div class="stat"><div class="n" id="s_langs"></div><div class="l" data-t="r_s1"></div></div>
    <div class="stat"><div class="n" id="s_cov"></div><div class="l" data-t="r_s2"></div></div>
    <div class="stat"><div class="n" id="s_spk"></div><div class="l" data-t="r_s3"></div></div>
  </div>
</div></section>

<!-- UNFINISHED TASK -->
<section id="task" class="alt"><div class="wrap">
  <div class="kicker" data-t="t_kick"></div>
  <h2 data-t="t_h"></h2>
  <p class="lead" data-t="t_lead"></p>
  <div class="bars" id="worldBars"></div>
  <p class="lead" style="margin-top:28px" data-t="t_pray_lead"></p>
  <div class="pray" id="prayList"></div>
</div></section>

<!-- VERBATIM -->
<section id="verbatim"><div class="wrap">
  <div class="kicker" data-t="v_kick"></div>
  <h2 data-t="v_h"></h2>
  <p class="lead" data-t="v_lead"></p>
  <div class="verses" id="verseShow"></div>
  <p class="sub" style="font-size:.85rem;margin-top:6px" data-t="v_note"></p>
</div></section>

<!-- GLOBE -->
<section id="earth"><div class="wrap">
  <div class="kicker" data-t="e_kick"></div>
  <h2 data-t="e_h"></h2>
  <p class="lead" data-t="e_lead"></p>
  <div class="globe-wrap"><svg id="globe" viewBox="0 0 560 560" role="img" aria-label="globe of carried languages"></svg></div>
  <div class="legend" style="justify-content:center">
    <span><i class="sw" style="background:var(--full)"></i><span data-t="m_full"></span></span>
    <span><i class="sw" style="background:var(--partial)"></i><span data-t="m_partial"></span></span>
    <span><i class="sw" style="background:var(--bridge)"></i><span data-t="m_bridge"></span></span>
    <span><i class="sw" style="background:var(--obs)"></i><span data-t="m_obs"></span></span>
  </div>
  <p class="globe-hint" data-t="e_hint"></p>
</div></section>

<!-- BY REGION -->
<section id="region" class="alt"><div class="wrap">
  <div class="kicker" data-t="g_kick"></div>
  <h2 data-t="g_h"></h2>
  <p class="lead" data-t="g_lead"></p>
  <div class="regions" id="regionCards"></div>
</div></section>

<!-- TREEMAP -->
<section id="map"><div class="wrap">
  <div class="kicker" data-t="m_kick"></div>
  <h2 data-t="m_h"></h2>
  <p class="lead" data-t="m_lead"></p>
  <div id="treemap"></div>
  <div class="legend" style="margin-top:12px">
    <span><i class="sw" style="background:var(--full)"></i><span data-t="m_full"></span></span>
    <span><i class="sw" style="background:var(--partial)"></i><span data-t="m_partial"></span></span>
    <span><i class="sw" style="background:var(--bridge)"></i><span data-t="m_bridge"></span></span>
    <span><i class="sw" style="background:var(--obs)"></i><span data-t="m_obs"></span></span>
  </div>
</div></section>

<!-- INVITATION -->
<section id="invite"><div class="wrap">
  <div class="kicker" data-t="i_kick"></div>
  <h2 data-t="i_h"></h2>
  <p class="lead" data-t="i_lead"></p>
  <div class="invite">
    <div class="c"><h3 data-t="i_p_h"></h3><p data-t="i_p_b"></p></div>
    <div class="c"><h3 data-t="i_s_h"></h3><p data-t="i_s_b"></p></div>
    <div class="c"><h3 data-t="i_g_h"></h3><p data-t="i_g_b"></p></div>
    <div class="c"><h3 data-t="i_t_h"></h3><p data-t="i_t_b"></p></div>
  </div>
  <p style="margin-top:26px"><a class="cta" href="/" data-t="i_cta"></a></p>
</div></section>

<footer><div class="wrap">
  <p data-t="foot"></p>
  <div class="src" id="sources"></div>
</div></footer>

<script>
const T = {
  kicker:{ko:'한눈에 보는 성경 이야기 · 데이터',en:'Bible in One Scroll · Data'},
  title:{ko:'모든 민족과 방언에게',en:'To Every Tribe and Tongue'},
  verse:{ko:'“이 후에 내가 보니 각 나라와 족속과 백성과 방언에서 아무도 능히 셀 수 없는 큰 무리가 …” (요한계시록 7:9)',
    en:'“After this I looked, and behold, a great multitude that no one could number, from every nation, from all tribes and peoples and languages …” (Revelation 7:9)'},
  purpose:{ko:'이 페이지는 한 가지를 위해 있습니다 — 복음이 모든 방언에 닿게 하시는 하나님의 일을 보여 드리는 것. 아래의 모든 숫자는 “우리가 한 일”이 아니라 아직 남은 과업과 함께 드리는 기도이자, 말씀을 지켜 오신 교회를 향한 감사입니다.',
    en:'This page exists for one thing — to show God’s work of carrying the gospel into every tongue. Every number below is not “what we did,” but a prayer offered alongside the task that remains, and thanks for the church that has preserved the Word.'},

  f_kick:{ko:'먼저, 진귀한 사실들',en:'First, some rare facts'},
  f_h:{ko:'한 이야기를 여러 언어로 옮기다 마주친 것들',en:'What we met while carrying one story into many tongues'},
  f_lead:{ko:'성경을 여러 언어로 인용하다 보면, 사람의 언어 속에 하나님이 심어 두신 놀라운 다양성과 — 그 모두를 관통하는 한 분 그리스도를 만나게 됩니다.',
    en:'Quoting Scripture across languages reveals the astonishing diversity God planted in human speech — and the one Christ who runs through all of it.'},

  r_kick:{ko:'① 지금까지의 도달',en:'① The reach so far'},
  r_h:{ko:'약 80%, 그리고 남은 20%',en:'About 80% — and the remaining 20%'},
  r_lead:{ko:'조슈아 프로젝트 기준, 지금 옮겨진 언어들은 세계 인구의 약 80%(모어 기준)에 가 닿습니다. 채워지지 않은 점들이 이 일의 이유입니다.',
    en:'By Joshua Project data, the languages carried so far reach about 80% of the world’s people (by mother tongue). The dots not yet filled are the reason for this work.'},
  r_lg1:{ko:'옮겨진 언어가 닿는 사람',en:'reached by a carried language'},
  r_lg2:{ko:'아직',en:'not yet'},
  r_s1:{ko:'언어',en:'languages'}, r_s2:{ko:'세계 인구 커버(모어)',en:'of world population (L1)'}, r_s3:{ko:'모어 화자',en:'mother-tongue speakers'},

  t_kick:{ko:'② 아직 남은 과업',en:'② The unfinished task'},
  t_h:{ko:'세계 성경 번역의 현실',en:'The reality of Bible translation'},
  t_lead:{ko:'세상에는 약 7,400개의 언어가 있습니다. 그 중 전권 성경이 있는 언어는 일부일 뿐 — 번역은 역사상 가장 가까이 왔지만, 아직 끝나지 않았습니다.',
    en:'There are about 7,400 living languages. Only a fraction have the whole Bible — translation is nearer than ever, yet not finished.'},
  t_pray_lead:{ko:'우리도 옮기려다 멈춘 언어들이 있습니다. 믿을 만한 원어민 번역 없이 AI 산문을 게시하느니, 충실한 “아직”을 택했습니다. 이 언어들을 위해 기도해 주세요 — 사람 번역자가 필요합니다.',
    en:'There are languages we began and then paused. Rather than publish AI prose without a trustworthy native rendering, we chose a faithful “not yet.” Please pray for these — they need human translators.'},

  v_kick:{ko:'③ 말씀은 번역돼도 흔들리지 않는다',en:'③ The Word holds across tongues'},
  v_h:{ko:'한 구절, 여러 문자 — 한 글자도 지어내지 않고',en:'One verse, many scripts — not a single word invented'},
  v_lead:{ko:'모든 구절은 각 언어의 공식 성경 역본에서 그대로 옮겨 왔습니다. 줄거리는 다시 풀어 쓰되, 성경 본문은 절대 의역하지 않습니다. 아래는 요한복음 3:16입니다.',
    en:'Every verse is quoted verbatim from each language’s official Bible translation. The storyline is retold, but the biblical text is never paraphrased. Below is John 3:16.'},
  v_note:{ko:'',en:''},

  e_kick:{ko:'④ 땅끝까지',en:'④ To the ends of the earth'},
  e_h:{ko:'한 점이 한 언어 — 지구 위에서',en:'One point, one language — on the earth'},
  e_lead:{ko:'옮겨진 언어를 화자가 가장 많이 사는 곳에 점으로 찍었습니다. 크기는 모어 화자 수, 색은 옮긴 방식입니다. 끌어서 돌려 보세요.',

let D=null, L='ko';

const nf=n=>n.toLocaleString(L==='ko'?'ko-KR':'en-US');
function human(n){ if(L==='ko'){ if(n>=1e8)return (n/1e8).toFixed(n>=1e9?1:0)+'억'; if(n>=1e4)return Math.round(n/1e4)+'만'; return nf(n);} if(n>=1e9)return (n/1e9).toFixed(2)+'B'; if(n>=1e6)return (n/1e6).toFixed(0)+'M'; if(n>=1e3)return (n/1e3).toFixed(0)+'K'; return nf(n);}
const esc=s=>String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/"/g,'&quot;');

function applyText(){
  document.documentElement.lang=L; document.body.className=L;
  $$('[data-t]').forEach(el=>{const k=el.getAttribute('data-t'); if(T[k])el.innerHTML=T[k][L];});
  $('#langCur').textContent = L==='ko'?'한국어':'English';
  $$('#langPanel button').forEach(b=>b.classList.toggle('on',b.dataset.l===L));
}

/* facts carousel */
let fi=0, ftimer=null;
function renderFact(){
  const f=FACTS[fi];
  $('#factStage').innerHTML=`<span class="tag">${f.tag[L]}</span><h3>${f.h[L]}</h3>
    ${f.multi?`<div class="multi">${esc(f.multi)}</div>`:''}<p>${f.p[L]}</p>`;
  $('#fCount').textContent=`${fi+1} / ${FACTS.length}`;
  $$('#fDots i').forEach((d,i)=>d.classList.toggle('on',i===fi));
}
function gotoFact(i){ fi=(i+FACTS.length)%FACTS.length; renderFact(); }
function autoFact(){ clearInterval(ftimer); ftimer=setInterval(()=>gotoFact(fi+1),6500); }
function buildFacts(){
  $('#fDots').innerHTML=FACTS.map((_,i)=>`<i data-i="${i}"></i>`).join('');
  $$('#fDots i').forEach(d=>d.addEventListener('click',()=>{gotoFact(+d.dataset.i);autoFact();}));
  $('#fPrev').onclick=()=>{gotoFact(fi-1);autoFact();};
  $('#fNext').onclick=()=>{gotoFact(fi+1);autoFact();};
  const c=$('.caro'); c.addEventListener('mouseenter',()=>clearInterval(ftimer)); c.addEventListener('mouseleave',autoFact);
  renderFact(); autoFact();
}

function renderReach(){
  const pct=Math.round(D.totals.coveragePct);
  $('#dots').innerHTML=Array.from({length:100},(_,i)=>`<i class="${i<pct?'f':''}"></i>`).join('');
  $('#s_langs').textContent=nf(D.totals.languages);
  $('#s_cov').textContent=D.totals.coveragePct+'%';
  $('#s_spk').textContent=human(D.totals.coveredSpeakers);
}

  const why={DEFERRED:{ko:'성경 본문은 확보됐으나, 믿을 만한 원어민 산문이 필요',en:'Scripture is in hand, but it needs a trustworthy native rendering'},
    HELD:{ko:'아직 가져올 수 있는 성경 역본을 찾지 못함',en:'No fetchable Bible edition found yet'},
    'COVERED-BY-PARENT':{ko:'표준어 페이지로 충분히 닿음',en:'Adequately reached by the standard-language page'}};
  const items=D.deferred.slice().sort((a,b)=>(order[a.category]-order[b.category])).slice(0,12);
  $('#prayList').innerHTML=items.map(d=>`<div class="it"><b>${esc(d.language)}</b>
    <span class="pill ${d.category}">${d.category==='DEFERRED'?(L==='ko'?'보류':'deferred'):(L==='ko'?'대기':'held')}</span>
    <span class="why">${(why[d.category]||{ko:'',en:''})[L]}.</span></div>`).join('');
}
function renderVerses(){
  $('#verseShow').innerHTML=D.showcase.map(s=>{
    const rtl=/^(ar|he|ckb|fa|ur|prs|sdh|yi)/.test(s.code);
    return `<div class="vse"><div class="lab">${esc(s.label)}</div>
      <div class="tx" dir="${rtl?'rtl':'ltr'}" lang="${s.code}">${esc(s.text)}</div></div>`;
  }).join('');
  $('[data-t="v_note"]').innerHTML=(L==='ko'
    ? `요한복음 3:16 — ${D.showcase.length}개 문자로. 전부 각 언어 공식 역본에서 그대로 가져온 본문입니다.`
    : `John 3:16 in ${D.showcase.length} scripts — every line taken verbatim from each language’s official edition.`);
}
function renderRegions(){
  const reg={};
  for(const [k,v] of Object.entries(D.regions||{})){
    let key=k; if(k==='Australia')key='Oceania';
    if(!REGION[key])continue;
    reg[key]=reg[key]||{count:0,pop:0}; reg[key].count+=v.count; reg[key].pop+=v.pop;
  }
  const arr=Object.entries(reg).sort((a,b)=>b[1].pop-a[1].pop);
  const max=Math.max(...arr.map(([,v])=>v.pop),1);
  $('#regionCards').innerHTML=arr.map(([k,v])=>`<div class="rg">
    <div class="top"><span class="em">${REGION[k].em}</span>${REGION[k][L]}</div>
    <div class="m">${v.count} ${L==='ko'?'개 언어':'languages'} · ${human(v.pop)} ${L==='ko'?'명':'people'}</div>
    <div class="track"><div class="fill" style="width:${Math.max(4,v.pop/max*100)}%"></div></div></div>`).join('');
}
function renderMap(){
  const el=$('#treemap'); el.innerHTML=''; const W=el.clientWidth, H=el.clientHeight||460;
  const col={full:'var(--full)',partial:'var(--partial)',bridge:'var(--bridge)',obs:'var(--obs)'};
  const data=D.languages.filter(l=>l.pop>0).map(l=>({...l,v:Math.sqrt(l.pop)})).sort((a,b)=>b.v-a.v);
  function place(d,x,y,w,h){ if(w<=0||h<=0)return; const big=w>44&&h>24;
    el.insertAdjacentHTML('beforeend',`<div class="cell" title="${esc(d.native)} (${esc(d.en)}) · ${human(d.pop)}"
      style="left:${x}px;top:${y}px;width:${Math.max(0,w-1)}px;height:${Math.max(0,h-1)}px;background:${col[d.mode]||'var(--bridge)'}">${big?`${esc(d.native)}<br><small>${human(d.pop)}</small>`:''}</div>`);
  }
  function tm(items,x,y,w,h){ if(!items.length)return; if(items.length===1){place(items[0],x,y,w,h);return;}
    const tot=items.reduce((s,d)=>s+d.v,0); let ls=0,i=0;
    while(i<items.length-1 && ls+items[i].v<tot/2){ls+=items[i].v;i++;} ls+=items[i].v;
    const left=items.slice(0,i+1),right=items.slice(i+1),f=ls/tot;
    if(w>=h){tm(left,x,y,w*f,h);tm(right,x+w*f,y,w*(1-f),h);} else {tm(left,x,y,w,h*f);tm(right,x,y+h*f,w,h*(1-f));}
  }
  tm(data,0,0,W,H);
}
/* orthographic rotating globe — vanilla SVG, no dependencies (CSP-safe) */
let gRot=0, gTilt=18, gDrag=null, gPaused=false, gTimer=null;
function renderGlobe(){
  const svg=$('#globe'); if(!svg||!D) return;
  const R=250, cx=280, cy=280;
  const col={full:'var(--full)',partial:'var(--partial)',bridge:'var(--bridge)',obs:'var(--obs)'};
  const rad=gTilt*Math.PI/180, sinP0=Math.sin(rad), cosP0=Math.cos(rad);
  const pr=(lat,lng)=>{ const f=lat*Math.PI/180, l=(lng+gRot)*Math.PI/180;
    const cosc=sinP0*Math.sin(f)+cosP0*Math.cos(f)*Math.cos(l);
    return {x:cx+R*Math.cos(f)*Math.sin(l), y:cy-R*(cosP0*Math.sin(f)-sinP0*Math.cos(f)*Math.cos(l)), c:cosc}; };
  let s='<defs><radialGradient id="ocean" cx="38%" cy="32%" r="78%">'
    +'<stop offset="0%" stop-color="var(--card)"/><stop offset="65%" stop-color="var(--bg2)"/><stop offset="100%" stop-color="var(--bg)"/></radialGradient></defs>';
  s+=`<circle cx="${cx}" cy="${cy}" r="${R}" fill="url(#ocean)" stroke="var(--line)" stroke-width="1"/>`;
  const grat=[];
  for(let lng=-180;lng<180;lng+=30){let seg=[];for(let lat=-90;lat<=90;lat+=4){const p=pr(lat,lng);if(p.c>0)seg.push(p.x.toFixed(1)+','+p.y.toFixed(1));else{if(seg.length>1)grat.push(seg);seg=[];}}if(seg.length>1)grat.push(seg);}
  for(let lat=-60;lat<=60;lat+=30){let seg=[];for(let lng=-180;lng<=180;lng+=4){const p=pr(lat,lng);if(p.c>0)seg.push(p.x.toFixed(1)+','+p.y.toFixed(1));else{if(seg.length>1)grat.push(seg);seg=[];}}if(seg.length>1)grat.push(seg);}
  for(const seg of grat) s+=`<polyline points="${seg.join(' ')}" fill="none" stroke="var(--line)" stroke-width="0.6" opacity="0.5"/>`;
  const maxpop=Math.max(...D.languages.map(l=>l.pop))||1;
  const pts=D.languages.filter(l=>l.lat!=null&&l.pop>0).map(l=>({l,p:pr(l.lat,l.lng)})).filter(o=>o.p.c>0).sort((a,b)=>a.p.c-b.p.c);
  for(const {l,p} of pts){ const r=Math.max(1.7,Math.min(9,Math.sqrt(l.pop)/Math.sqrt(maxpop)*9));
    s+=`<circle cx="${p.x.toFixed(1)}" cy="${p.y.toFixed(1)}" r="${r.toFixed(1)}" fill="${col[l.mode]||'var(--bridge)'}" fill-opacity="${(0.5+0.5*p.c).toFixed(2)}" stroke="rgba(0,0,0,.3)" stroke-width="0.5"><title>${esc(l.native)} (${esc(l.en)}) · ${human(l.pop)}</title></circle>`; }
  svg.innerHTML=s;
}
function startGlobe(){
  const svg=$('#globe'); if(!svg) return;
  clearInterval(gTimer); gTimer=setInterval(()=>{ if(!gPaused){ gRot=(gRot+0.32)%360; renderGlobe(); } },40);
  svg.onpointerenter=()=>gPaused=true;
  svg.onpointerleave=()=>{gPaused=false;gDrag=null;};
  svg.onpointerdown=e=>{gDrag={x:e.clientX,y:e.clientY,rot:gRot,tilt:gTilt};};
  svg.onpointermove=e=>{ if(!gDrag)return; gRot=gDrag.rot+(e.clientX-gDrag.x)*0.4; gTilt=Math.max(-55,Math.min(75,gDrag.tilt+(e.clientY-gDrag.y)*0.3)); renderGlobe(); };
  svg.onpointerup=()=>{gDrag=null;};
  renderGlobe();
}
function renderSources(){
  const w=D.world;
  $('#sources').innerHTML=(L==='ko'
    ?`출처 · 세계 성경 번역 통계: <a href="${w.sourceUrl}" target="_blank" rel="noopener">${w.source}</a> (${w.asOf}). 언어별 화자 수: <a href="https://joshuaproject.net" target="_blank" rel="noopener">Joshua Project</a>. 성경 본문: 각 언어의 공식 역본(개역개정·ESV·和合本·시노드역·Van Dyck 외 197종).`
    :`Sources · World Bible-translation figures: <a href="${w.sourceUrl}" target="_blank" rel="noopener">${w.source}</a> (${w.asOf}). Speaker populations: <a href="https://joshuaproject.net" target="_blank" rel="noopener">Joshua Project</a>. Biblical text: each language’s official edition (개역개정, ESV, 和合本, Synodal, Van Dyck, and 197 others).`);
}
function renderAll(){ applyText(); renderReach(); renderTask(); renderVerses(); renderGlobe(); renderRegions(); renderMap(); renderSources(); renderFact(); }

/* theme — shared with the main site (localStorage 'bibleTheme', .sepia class) */
if(localStorage.getItem('bibleTheme')==='sepia') document.documentElement.classList.add('sepia');
$('#themeBtn').addEventListener('click',()=>{
  document.documentElement.classList.toggle('sepia');
  const sp=document.documentElement.classList.contains('sepia');
  localStorage.setItem('bibleTheme',sp?'sepia':'dark');
  document.querySelector('meta[name=theme-color]').setAttribute('content',sp?'#efe6d3':'#0e1118');
});
/* language — 🌐 button + small panel (ko/en for now), shared 'lang' key */
const lp=$('#langPanel');
$('#langBtn').addEventListener('click',e=>{e.stopPropagation();lp.hidden=!lp.hidden;});
document.addEventListener('click',()=>{lp.hidden=true;});
lp.addEventListener('click',e=>e.stopPropagation());
$$('#langPanel button').forEach(b=>b.addEventListener('click',()=>{
  L=b.dataset.l; try{localStorage.setItem('lang',L);}catch(e){} lp.hidden=true; if(D)renderAll(); else applyText();
}));
addEventListener('resize',()=>{ if(D) renderMap(); });

/* initial language: saved → browser → ko */
try{ const sv=localStorage.getItem('lang'); if(sv==='ko'||sv==='en') L=sv; else if((navigator.language||'').toLowerCase().startsWith('en')) L='en'; }catch(e){}
fetch('./data.json').then(r=>r.json()).then(d=>{D=d; renderAll(); buildFacts(); startGlobe();})
  .catch(()=>{ applyText(); $('#factStage').innerHTML='<p class="sub">data.json load failed.</p>'; });
</script>
